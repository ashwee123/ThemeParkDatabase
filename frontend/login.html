<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — HR Manager Portal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="login-page">
  <div class="noise" aria-hidden="true"></div>
  <main class="login-card-wrap">
    <section class="card login-card">
      <h1 class="login-title">HR Manager Portal</h1>
      <p class="tagline">Theme Park · sign in to continue</p>
      <form id="form-login" class="grid-form" autocomplete="on">
        <label>Username<input name="username" type="text" required autocomplete="username" /></label>
        <label>Password<input name="password" type="password" required autocomplete="current-password" /></label>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Sign in</button>
        </div>
      </form>
      <p id="login-error" class="login-error hidden" role="alert"></p>
    </section>
  </main>
  <script>
    document.getElementById("form-login").addEventListener("submit", async function (ev) {
      ev.preventDefault();
      const errEl = document.getElementById("login-error");
      errEl.classList.add("hidden");
      const f = ev.target;
      const body = {
        username: f.username.value.trim(),
        password: f.password.value,
      };
      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(function () { return {}; });
        if (!res.ok) {
          errEl.textContent = (data && data.error) ? data.error : "Sign-in failed";
          if (data && data.hint) errEl.textContent += " — " + data.hint;
          errEl.classList.remove("hidden");
          return;
        }
        window.location.href = "/";
      } catch (e) {
        errEl.textContent = "Network error — is the server running?";
        errEl.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
