<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HR Portal | Theme Park Database</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="noise"></div>

  <header class="site-header">
    <h1>HR Portal</h1>
    <p class="tagline">Employees, Managers, Activity & Salary</p>
  </header>

  <nav class="tabs">
    <button class="tab active" data-target="employees">Employees</button>
    <button class="tab" data-target="managers">Managers</button>
    <button class="tab" data-target="activity">Activity</button>
    <button class="tab" data-target="salary">Salary</button>
  </nav>

  <main>
    <section id="employees" class="panel active">
      <div class="card">
        <h3>Add Employee</h3>
        <div class="form-grid">
          <input id="empName" placeholder="Name">
          <input id="empRole" placeholder="Role">
          <input id="empSalary" type="number" placeholder="Salary">
          <input id="empManager" placeholder="Manager ID">
          <input id="empArea" placeholder="Area ID">
        </div>
        <button class="btn btn-primary" onclick="addEmployee()">Add Employee</button>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr><th>Name</th><th>Role</th><th>Salary</th></tr>
          </thead>
          <tbody id="empTable"></tbody>
        </table>
      </div>
    </section>

    <section id="managers" class="panel">
       <div class="card">
        <h3>Add Manager</h3>
        <input id="mgrId" placeholder="Manager ID">
        <input id="mgrName" placeholder="Name">
        <button class="btn btn-primary" onclick="addManager()">Add Manager</button>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <tbody id="mgrTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
